# Onyx system settings (read at boot).
# verbose:  1 = log app lifecycle (start/spawn/exit/kill) to the kernel log (kmsg).
# timezone: minutes offset from UTC for the local clock (60 = CET, 120 = CEST).
# ntp:      time server to sync against once WLAN is up.
verbose=0
timezone=120
ntp=pool.ntp.org
