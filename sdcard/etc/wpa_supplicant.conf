#
# wpa_supplicant.conf -- WLAN credentials for Onyx (read at boot by the kernel).
#
# SECURITY: this file stores your Wi-Fi passphrase in CLEAR TEXT. Keep it on the
# SD card only; do NOT commit it to a public repository. Edit ssid/psk for your
# own network. Uncomment country= with your ISO code if association is rejected.
#

country=BE

network={
	ssid="Wegener_Wifi"
	psk="REDACTED-set-on-the-SD-card"
	proto=WPA2
	key_mgmt=WPA-PSK
}
